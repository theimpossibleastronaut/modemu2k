name: C/C++ CI
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

on:
  push:
    branches: master
    paths-ignore: &shared_paths
    - '**/*.md'
  pull_request:
    branches: master
    paths-ignore: *shared_paths

env:
  CFLAGS: -Werror

jobs:
  linux:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
        cc: [gcc, clang]
    runs-on: ${{ matrix.os }}
    env:
      CC: ${{ matrix.cc }}
    steps:
    - uses: actions/checkout@v6

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y meson ninja-build ${{ matrix.cc }}

    - name: Setup
      # docker-test=true is safe to pass: ubuntu-latest and ubuntu-24.04-arm
      # both ship docker pre-installed and the runner user is in the docker
      # group, so test_docker_telnet actually runs (rather than skipping
      # itself via the exit-77 path it would take on a machine without docker).
      run: meson setup builddir -Db_sanitize=address,undefined -Db_lundef=false -Ddocker-test=true

    - name: Build (and pre-warm docker image in parallel)
      # Kick off the busybox-telnetd image build in the background so
      # ninja runs concurrently — when meson test reaches
      # test_docker_telnet, its own `docker build --load -q` is a cache
      # hit (~1s) instead of the cold pull-and-install (~30s) we'd
      # otherwise pay. `wait` surfaces the docker build's exit code so
      # a Dockerfile regression fails this step rather than the test.
      run: |
        docker build --load -q -t m2k-telnetd-test docker > /tmp/docker-build.log 2>&1 &
        docker_pid=$!
        ninja -v -C builddir
        wait $docker_pid || { echo '--- docker build log ---'; cat /tmp/docker-build.log; exit 1; }

    - name: Test
      run: meson test -C builddir --print-errorlogs

  macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install dependencies
      run: brew install meson

    - name: Setup
      run: meson setup builddir

    - name: Build
      run: ninja -v -C builddir

    - name: Test
      run: meson test -C builddir --print-errorlogs
