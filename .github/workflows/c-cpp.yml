name: C/C++ CI
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

on:
  push:
    branches: master
    paths-ignore: &shared_paths
    - '**/*.md'
  pull_request:
    branches: master
    paths-ignore: *shared_paths

env:
  CFLAGS: -Werror

jobs:
  gcc:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y meson ninja-build

    - name: Setup
      # docker-test=true is safe to pass: ubuntu-latest and ubuntu-24.04-arm
      # both ship docker pre-installed and the runner user is in the docker
      # group, so test_docker_telnet actually runs (rather than skipping
      # itself via the exit-77 path it would take on a machine without docker).
      run: meson setup builddir -Db_sanitize=address,undefined -Db_lundef=false -Ddocker-test=true

    - name: Build
      run: ninja -v -C builddir

    - name: Test
      run: meson test -C builddir --print-errorlogs

  macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install dependencies
      run: brew install meson

    - name: Setup
      run: meson setup builddir

    - name: Build
      run: ninja -v -C builddir

    - name: Test
      run: meson test -C builddir --print-errorlogs
