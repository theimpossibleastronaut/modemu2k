name: Build AppImage
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'version number'
        required: false
        type: string
  push:
    tags:
      - 'v*'
    branches: master

  pull_request:
    branches: master
    paths:
      - '.github/workflows/appimage.yml'
      - 'packaging/appimage/**'

jobs:
  build-appimage:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    # Arch base per arch: official archlinux is x86_64-only, so the arm64
    # leg uses the community Arch Linux ARM image.
    container:
      image: ${{ matrix.image }}
    env:
      VERSION: ${{ inputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            image: archlinux:latest
          - runner: ubuntu-24.04-arm
            image: lopsided/archlinux:latest

    steps:
      # Runs before checkout: the arm (lopsided/archlinux) base image ships
      # only bsdtar, but actions/checkout needs GNU tar + git.
      - name: Install build dependencies
        run: |
          # pacman 7's download sandbox (Landlock + the 'alpm' DownloadUser)
          # cannot be applied inside the CI container; disable it.
          sed -i '/^\[options\]/a DisableSandbox' /etc/pacman.conf
          pacman -Syu --noconfirm --needed \
            base-devel \
            flex \
            git \
            meson \
            ninja \
            patchelf \
            tar \
            wget \
            zsync

      - name: Checkout
        uses: actions/checkout@v7

      - name: Set version
        run: |
          if [[ -z "${VERSION}" ]]; then
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              TAG_NAME=${GITHUB_REF#refs/tags/}
              VERSION=${TAG_NAME}
            else
              VERSION=snapshot
            fi
            echo "VERSION=$VERSION" >> $GITHUB_ENV
          fi

      - name: Build AppImage
        run: packaging/appimage/build-appimage.sh

      - name: Create sha256sum
        run: |
          ARCH=$(uname -m)
          echo "ARCH=${ARCH}" >> $GITHUB_ENV
          cd out
          file=$(ls *.AppImage)
          sha256sum "$file" > "$file.sha256sum";

      - name: Artifact Filename
        run: echo "ARTIFACT_NAME=modemu2k-appImage-${ARCH//\//-}" >> $GITHUB_ENV

      - if: ${{ github.ref != 'refs/heads/master' }}
        name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ./out/*AppImage*
          if-no-files-found: error

      - name: Release (Tagged)
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          artifacts: "./out/*AppImage*"
          allowUpdates: true
          prerelease: false
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - if: ${{ github.ref == 'refs/heads/master' }}
        name: 'Prerelease'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "./out/*AppImage*"
          body: "modemu2k Snapshot Release"
          allowUpdates: true
          prerelease: true
          removeArtifacts: false
          replacesArtifacts: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          tag: snapshot
