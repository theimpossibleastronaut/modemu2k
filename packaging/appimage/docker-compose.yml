services:
  build:
    environment:
      VERSION: ${VERSION:-snapshot}
      WORKSPACE: ${WORKSPACE:-/workspace}
      GITHUB_REPOSITORY: "${GITHUB_REPOSITORY:-}"
    image: andy5995/linuxdeploy:v3-jammy
    # Unset PLATFORM (the default) -> docker-compose picks the host arch
    # from the image's multi-arch manifest. Override with e.g.
    # `PLATFORM=linux/arm64 docker compose ...` to force cross-arch
    # emulation under qemu-user-static.
    platform: ${PLATFORM}
    volumes:
      - ${PWD}:${WORKSPACE:-/workspace}
    working_dir: ${WORKSPACE:-/workspace}

    # Note that SCRIPT is not used by the container, therefore
    # is not included within the 'environment' section above
    #
    # Absolute path or Relative to workspace
    # e.g. $WORKSPACE/path/to/script
    command: "${SCRIPT:-packaging/appimage/build-appimage.sh}"
